<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>135 FILM · 胶片拼图</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Noto+Serif+SC:wght@300;400;600&display=swap');
:root{
  --bg:#0e0e0e;--sb:#111;--bdr:#222;--bdr2:#3a3a3a;
  --amber:#c8882a;--amberL:#e0a040;
  --tx:#d8d0c0;--txd:#666;--txm:#444;
  --sf:#181818;--sf2:#1e1e1e;
  --sheet-h: 60vh;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;outline:none}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:'Noto Serif SC',serif;display:flex;flex-direction:column}
/* ── 移动端核心交互优化 ── */
button, .stab, .sheet-handle-row, .lopt, .cbtn, .pbtn, .ibtn, .mode-btn, .outmode-btn{
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
}
/* ── HEADER ── */
header{
height:48px;background:#080808;border-bottom:1px solid var(--bdr);
display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;
position:relative;z-index:10;
}
.logo{font-family:'Special Elite',cursive;font-size:15px;color:var(--amber);letter-spacing:.06em}
.logo-sub{font-size:10px;color:var(--txd);letter-spacing:.15em}
.header-btns{margin-left:auto;display:flex;gap:8px;align-items:center}
.hbtn{
padding:5px 11px;border-radius:4px;font-size:11px;font-family:'Special Elite',cursive;
cursor:pointer;letter-spacing:.04em;border:none;transition:all .15s;
}
.hbtn-gen{background:var(--amber);color:#0e0e0e;font-weight:700}
.hbtn-gen:active{transform:scale(.95)}
.hbtn-gen:disabled{background:#333;color:#555;cursor:not-allowed;transform:none}
.hbtn-exp{background:transparent;border:1px solid var(--amber);color:var(--amber)}
.hbtn-exp:disabled{border-color:#333;color:#444;cursor:not-allowed}
/* ── CANVAS AREA ── */
.ca{
flex:1;display:flex;align-items:flex-start;justify-content:center;
padding:16px;overflow:auto;background:#0a0a0a;
-webkit-overflow-scrolling:touch;
}
.ca::-webkit-scrollbar{display:none}
.ph{
display:flex;flex-direction:column;align-items:center;justify-content:center;
gap:12px;color:var(--txd);text-align:center;margin:auto;
}
.phi{font-size:48px;opacity:.18}
.pht{font-size:14px;color:#444}
.phs{font-size:11px;line-height:1.9;opacity:.55;max-width:260px}
#cv{display:block;max-width:100%;height:auto;box-shadow:0 6px 40px rgba(0,0,0,.8);border-radius:2px}
/* ── BOTTOM SHEET ── */
.sheet-wrap{
position:fixed;bottom:0;left:0;right:0;z-index:100;
pointer-events:none;
}
.sheet{
background:var(--sb);border-top:1px solid var(--bdr);
border-radius:16px 16px 0 0;
pointer-events:all;
transform:translateY(calc(100% - 56px));
transition:transform .3s cubic-bezier(.32,.72,0,1);
max-height:85vh;display:flex;flex-direction:column;
will-change:transform;
}
.sheet.open{transform:translateY(0)}
.sheet-handle-row{
height:56px;display:flex;align-items:center;padding:0 16px;
cursor:pointer;flex-shrink:0;user-select:none;gap:12px;
position:relative;
}
.sheet-handle{
position:absolute;top:8px;left:50%;transform:translateX(-50%);
width:36px;height:4px;background:#333;border-radius:2px;
}
.sheet-tabs{display:flex;gap:6px;overflow-x:auto;flex:1;scrollbar-width:none;align-items:center}
.sheet-tabs::-webkit-scrollbar{display:none}
.stab{
padding:5px 12px;border-radius:20px;font-size:11px;white-space:nowrap;
background:var(--sf2);border:1px solid var(--bdr);color:var(--txd);
cursor:pointer;transition:all .15s;flex-shrink:0;
}
.stab.act{background:rgba(200,136,42,.12);border-color:var(--amber);color:var(--amber)}
.sheet-body{
overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;
padding:0 0 env(safe-area-inset-bottom,16px);
}
.sheet-body::-webkit-scrollbar{width:3px}
.sheet-body::-webkit-scrollbar-thumb{background:#2a2a2a}
/* ── PANELS ── */
.panel{display:none;padding:14px 16px 20px}
.panel.active{display:block}
/* Upload - 改用Label包裹的移动端兼容方案 */
.lbl{font-size:10px;color:var(--txd);letter-spacing:.18em;text-transform:uppercase;display:block;margin-bottom:8px}
.upz{
border:1px dashed #2e2e2e;border-radius:6px;padding:14px 10px;
text-align:center;cursor:pointer;position:relative;background:var(--sf);
transition:all .15s;display:block;width:100%;
}
.upz.dov{border-color:var(--amber);background:rgba(200,136,42,.06)}
.upz input{position:absolute;opacity:0;visibility:hidden;pointer-events:none;width:0;height:0}
.up-txt{font-size:11px;color:var(--txd);line-height:1.6}
.up-cnt{font-size:11px;color:var(--amber);margin-top:4px;font-weight:600}
.up-err{font-size:11px;color:#e05050;margin-top:3px;min-height:15px}
.tgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-top:10px}
.twrap{display:flex;flex-direction:column;gap:2px}
.thumb{aspect-ratio:3/2;border-radius:3px;overflow:hidden;position:relative;border:1.5px solid transparent;transition:border-color .12s}
.thumb.dot{border-color:var(--amber)}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
.tdel{
position:absolute;top:2px;right:2px;width:16px;height:16px;
background:rgba(0,0,0,.8);border:none;border-radius:50%;
color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.croprow{display:flex;gap:2px}
.cbtn, .rbtn{
flex:1;padding:2px 0;font-size:8px;background:var(--sf2);
border:1px solid var(--bdr);border-radius:2px;color:var(--txd);
cursor:pointer;text-align:center;font-family:inherit;transition:all .12s;
}
.cbtn.act, .rbtn:active{background:rgba(200,136,42,.15);border-color:var(--amber);color:var(--amber)}
/* mode row */
.mode-row{display:flex;gap:6px}
.mode-btn{
flex:1;padding:10px 4px;border:1px solid var(--bdr);border-radius:6px;
background:var(--sf);color:var(--tx);font-size:11px;cursor:pointer;
transition:all .15s;font-family:inherit;text-align:center;line-height:1.4;
}
.mode-btn.act{border-color:var(--amber);background:rgba(200,136,42,.1);color:var(--amber)}
.mn{display:block;font-weight:600;font-size:12px}
.ms{display:block;font-size:9px;color:var(--txd);margin-top:2px}
.mode-btn.act .ms{color:#a06820}
/* outmode */
.outmode-row{display:flex;gap:6px}
.outmode-btn{
flex:1;padding:10px 4px;border:1px solid var(--bdr);border-radius:6px;
background:var(--sf);color:var(--tx);font-size:11px;cursor:pointer;
transition:all .15s;font-family:inherit;text-align:center;line-height:1.4;
}
.outmode-btn.act{border-color:var(--amber);background:rgba(200,136,42,.1);color:var(--amber)}
.omn{display:block;font-weight:600;font-size:12px}
.oms{display:block;font-size:9px;color:var(--txd);margin-top:2px}
.outmode-btn.act .oms{color:#a06820}
/* leader */
.lgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.lopt{border:1.5px solid var(--bdr);border-radius:4px;overflow:hidden;cursor:pointer;transition:border-color .15s;background:var(--sf)}
.lopt.act{border-color:var(--amber)}
.lopt canvas{display:block;width:100%;height:auto}
.lname{font-size:8px;color:var(--txd);text-align:center;padding:3px 2px;line-height:1.2;background:var(--sf)}
.lopt.act .lname{color:var(--amber)}
/* preset */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.pbtn{
padding:9px 6px;border:1px solid var(--bdr);border-radius:5px;
background:var(--sf);color:var(--tx);font-size:10px;cursor:pointer;
text-align:center;font-family:inherit;transition:all .15s;line-height:1.4;
}
.pbtn.act{border-color:var(--amber);background:rgba(200,136,42,.1);color:var(--amber)}
.pn{display:block;font-weight:600;font-size:11px}
.ps{display:block;font-size:9px;color:var(--txd);margin-top:1px}
.pbtn.act .ps{color:#a06820}
/* intensity */
.irow{display:flex;gap:4px}
.ibtn{
flex:1;padding:8px 2px;border:1px solid var(--bdr);border-radius:4px;
background:var(--sf);color:var(--txd);font-size:10px;cursor:pointer;
text-align:center;font-family:inherit;transition:all .15s;
}
.ibtn.act{border-color:var(--amber);background:rgba(200,136,42,.1);color:var(--amber)}
/* slider */
.slrow{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--txd)}
.slrow input{flex:1;accent-color:var(--amber);cursor:pointer;height:22px}
.sval{min-width:18px;text-align:right;color:var(--tx);font-weight:600}
/* toggle */
.trow{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--txd);padding:2px 0}
.toggle{position:relative;width:40px;height:22px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.tslider{position:absolute;inset:0;background:#2a2a2a;border-radius:20px;transition:.2s}
.tslider::before{content:'';position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:#666;border-radius:50%;transition:.2s}
.toggle input:checked+.tslider{background:rgba(200,136,42,.3)}
.toggle input:checked+.tslider::before{background:var(--amber);transform:translateX(18px)}
/* text inputs */
.txin{
width:100%;background:var(--sf);border:1px solid var(--bdr);border-radius:5px;
color:var(--tx);padding:9px 11px;font-size:12px;font-family:'Special Elite',cursive;
outline:none;transition:border-color .15s;
}
.txin:focus{border-color:#444}
.txin-sm{
width:100%;background:var(--sf);border:1px solid var(--bdr);border-radius:5px;
color:var(--tx);padding:8px 11px;font-size:12px;font-family:'Noto Serif SC',serif;
outline:none;transition:border-color .15s;margin-bottom:6px;
}
.txin-sm:focus{border-color:#444}
.txin-sm::placeholder,.txin::placeholder{color:#444}
.txin-sm:last-child{margin-bottom:0}
/* divider */
.div{height:1px;background:var(--bdr);margin:14px 0}
/* section spacing */
.sec{margin-bottom:16px}
/* poster hidden */
.poster-section{display:none}
.poster-section.visible{display:block}
/* filmroll hidden for poster */
.filmroll-section{display:block}
.filmroll-section.hidden{display:none}
</style>
</head>
<body>
<!-- HEADER -->
<header>
  <span class="logo">135 FILM</span>
  <span class="logo-sub">胶片拼图</span>
  <div class="header-btns">
    <button class="hbtn hbtn-gen" id="genb" onclick="generate()" disabled>▶ 生成</button>
    <button class="hbtn hbtn-exp" id="expb" onclick="exportPNG()" disabled>↓ 导出</button>
  </div>
</header>
<!-- CANVAS AREA -->
<div class="ca" id="ca">
  <div class="ph" id="ph">
    <div class="phi">🎞</div>
    <div class="pht">点击下方「照片」上传 8–36 张</div>
    <div class="phs">胶卷模式：模拟35mm胶片展开<br>海报模式：白底满幅海报</div>
  </div>
  <canvas id="cv" style="display:none"></canvas>
</div>
<!-- BOTTOM SHEET -->
<div class="sheet-wrap">
  <div class="sheet" id="sheet">
    <div class="sheet-handle-row" id="sheetHandle">
      <div class="sheet-handle"></div>
      <div class="sheet-tabs" id="sheetTabs">
        <div class="stab act" data-panel="upload" onclick="switchTab(event,this)">📷 照片</div>
        <div class="stab" data-panel="mode" onclick="switchTab(event,this)">🎞 模式</div>
        <div class="stab" data-panel="film" onclick="switchTab(event,this)">🎬 胶卷头</div>
        <div class="stab" data-panel="tone" onclick="switchTab(event,this)">🎨 色调</div>
        <div class="stab" data-panel="layout" onclick="switchTab(event,this)">⚙️ 布局</div>
      </div>
    </div>
    <div class="sheet-body">
  <!-- PANEL: 照片 -->
  <div class="panel active" id="panel-upload">
    <span class="lbl">上传照片 <span style="color:#555;font-size:9px;letter-spacing:0;text-transform:none">（8–36张，支持JPG/PNG/WebP）</span></span>
    <label class="upz" id="uz">
      <input type="file" id="fi" multiple accept="image/*,image/jpeg,image/png,image/webp">
      <div style="font-size:22px;margin-bottom:4px;opacity:.45">📷</div>
      <div class="up-txt">点击/拖拽上传<br>JPG · PNG · WebP</div>
      <div class="up-cnt" id="ucnt">0 / 36 张</div>
    </label>
    <div class="up-err" id="uerr"></div>
    <div class="tgrid" id="tg"></div>
  </div>
  <!-- PANEL: 模式 -->
  <div class="panel" id="panel-mode">
    <div class="sec">
      <span class="lbl">输出模式</span>
      <div class="outmode-row">
        <button class="outmode-btn act" data-om="filmroll" onclick="selOutMode(this)">
          <span class="omn">胶卷模式</span><span class="oms">含胶卷壳排版</span>
        </button>
        <button class="outmode-btn" data-om="poster" onclick="selOutMode(this)">
          <span class="omn">海报模式</span><span class="oms">白底胶片框</span>
        </button>
      </div>
    </div>
    <!-- Film Roll only -->
    <div id="filmroll-settings" class="filmroll-section">
      <div class="sec">
        <span class="lbl">版式</span>
        <div class="mode-row">
          <button class="mode-btn act" data-m="portrait" onclick="selMode(this)">
            <span class="mn">竖版</span><span class="ms">帧 2:3 竖向</span>
          </button>
          <button class="mode-btn" data-m="landscape" onclick="selMode(this)">
            <span class="mn">横版</span><span class="ms">帧 3:2 横向</span>
          </button>
        </div>
      </div>
      <div class="trow">
        <span>复古白框</span>
        <label class="toggle"><input type="checkbox" id="wbToggle" checked><span class="tslider"></span></label>
      </div>
    </div>
    <!-- Poster only -->
    <div id="poster-settings" class="poster-section">
      <div class="sec">
        <span class="lbl">版式</span>
        <div class="mode-row">
          <button class="mode-btn act" data-m="portrait" onclick="selMode(this)">
            <span class="mn">竖版照片</span><span class="ms">帧 2:3 竖向</span>
          </button>
          <button class="mode-btn" data-m="landscape" onclick="selMode(this)">
            <span class="mn">横版照片</span><span class="ms">帧 3:2 横向</span>
          </button>
        </div>
      </div>
      <div class="sec">
        <span class="lbl">海报标题</span>
        <input class="txin" id="posterTitle" placeholder="LIFE WITH FILM" maxlength="32" style="font-family:'Special Elite',cursive;font-size:15px">
      </div>
      <div class="sec">
        <span class="lbl">底部标签 <span style="color:#555;font-size:9px;letter-spacing:0;text-transform:none">（最多3条，可留空）</span></span>
        <input class="txin-sm" id="tag1" placeholder="🎞  Kodak Ultramax 400 · ISO 400" maxlength="40">
        <input class="txin-sm" id="tag2" placeholder="📷  相机型号" maxlength="40">
        <input class="txin-sm" id="tag3" placeholder="🖨  扫描仪型号" maxlength="40">
      </div>
    </div>
  </div>
  <!-- PANEL: 胶卷头 -->
  <div class="panel" id="panel-film">
    <span class="lbl">胶卷头款式</span>
    <div class="lgrid" id="lgrid"></div>
  </div>
  <!-- PANEL: 色调 -->
  <div class="panel" id="panel-tone">
    <div class="sec">
      <span class="lbl">色调预设</span>
      <div class="pgrid">
        <button class="pbtn act" data-p="none" onclick="selPreset(this)"><span class="pn">原图</span><span class="ps">不加滤镜</span></button>
        <button class="pbtn" data-p="fuji200" onclick="selPreset(this)"><span class="pn">富士 C200</span><span class="ps">清新绿调</span></button>
        <button class="pbtn" data-p="kodak400" onclick="selPreset(this)"><span class="pn">柯达 400</span><span class="ps">暖黄复古</span></button>
        <button class="pbtn" data-p="fujiDisp" onclick="selPreset(this)"><span class="pn">富士一次性</span><span class="ps">冷青对比</span></button>
        <button class="pbtn" data-p="bw" onclick="selPreset(this)"><span class="pn">黑白</span><span class="ps">银盐质感</span></button>
      </div>
    </div>
    <div id="isec" style="display:none">
      <span class="lbl">滤镜浓度</span>
      <div class="irow">
        <button class="ibtn" data-v="20" onclick="selInt(this)">20%</button>
        <button class="ibtn" data-v="40" onclick="selInt(this)">40%</button>
        <button class="ibtn act" data-v="60" onclick="selInt(this)">60%</button>
        <button class="ibtn" data-v="80" onclick="selInt(this)">80%</button>
        <button class="ibtn" data-v="100" onclick="selInt(this)">100%</button>
      </div>
    </div>
  </div>
  <!-- PANEL: 布局 -->
  <div class="panel" id="panel-layout">
    <div class="sec">
      <span class="lbl" id="layoutLabel">每行帧数</span>
      <div class="slrow">
        <span id="layoutMin">3</span>
        <input type="range" min="1" max="7" value="5" step="1" id="fpsr" oninput="updateLayoutUI();document.getElementById('fpsv').textContent=this.value">
        <span id="layoutMax">7</span>
        <span class="sval" id="fpsv">5</span>
      </div>
    </div>
    <div class="sec" id="dateSection">
      <span class="lbl">日期 / 备注</span>
      <input class="txin" id="datin" placeholder="2024  SUMMER" maxlength="24">
    </div>
  </div>
</div><!-- /sheet-body -->
  </div><!-- /sheet -->
</div><!-- /sheet-wrap -->
<script>
'use strict';
// ═══════════════════════════════
// STATE - 新增rotate:0
// ═══════════════════════════════
let photos = [];
let filmMode = 'portrait';
let outputMode = 'filmroll';
let preset = 'none';
let intensity = 60;
let leaderIdx = 0;
let isProcessing = false;

// ── SHEET TOGGLE
// ──────────────────────────────────────────────────────────
const sheet = document.getElementById('sheet');
const sheetHandle = document.getElementById('sheetHandle');
let sheetOpen = false;

sheetHandle.addEventListener('click', (e) => {
  if (e.target.closest('.sheet-tabs')) return;
  sheetOpen = !sheetOpen;
  sheet.classList.toggle('open', sheetOpen);
});

function switchTab(e, el) {
  e.stopPropagation();
  document.querySelectorAll('.stab').forEach(t => t.classList.remove('act'));
  el.classList.add('act');
  const panelId = 'panel-' + el.dataset.panel;
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(panelId).classList.add('active');
  if (!sheetOpen) { sheetOpen = true; sheet.classList.add('open'); }
}

// ═══════════════════════════════
// CONSTANTS
// ═══════════════════════════════
const PRESETS = {
  none:     {filmBg:'#181818',holeBg:'#080808',r:null,   g:null,   b:null,   sat:1,   tint:null,                  grain:0 },
  fuji200:  {filmBg:'#181d18',holeBg:'#0a0a0a',r:[0,240],g:[0,255],b:[5,238],sat:1.05,tint:'rgba(10,30,10,0.1)', grain:14},
  kodak400: {filmBg:'#1c1a10',holeBg:'#0a0a08',r:[5,255],g:[0,243],b:[0,208],sat:1.1, tint:'rgba(40,20,0,0.1)',  grain:18},
  fujiDisp: {filmBg:'#0e1318',holeBg:'#060a0e',r:[0,228],g:[5,255],b:[12,255],sat:1.15,tint:'rgba(0,10,30,0.12)',grain:24},
  bw:       {filmBg:'#141414',holeBg:'#050505',r:null,   g:null,   b:null,   sat:0,   tint:null,                  grain:28},
};
const EDGE=4,GAP=3,PAD=22,WB=26,ROW_GAP=20;
const PORT={
  frameW:88,frameH:132,perfH:28,
  get stripH(){return this.frameH+this.perfH*2},
  stripW(fps){return EDGE*2+GAP*(fps-1)+this.frameW*fps},
  leftPad(fps){const cw=this.stripH*0.60;const ov=cw*0.15;return Math.ceil(cw-ov)+10}
};
const LAND={
  frameH:90,frameW:135,perfH:24,
  get stripH(){return this.frameH+this.perfH*2},
  stripW(fps){return EDGE*2+GAP*(fps-1)+this.frameW*fps},
  get leftPad(){const cw=this.stripH*0.60;const ov=cw*0.15;return Math.ceil(cw-ov)+10}
};

// ═══════════════════════════════
// 布局UI动态切换
// ═══════════════════════════════
function updateLayoutUI(){
  const fpsr = document.getElementById('fpsr');
  const layoutLabel = document.getElementById('layoutLabel');
  const layoutMin = document.getElementById('layoutMin');
  
  if(outputMode === 'poster'){
    layoutLabel.textContent = '每列张数';
    layoutMin.textContent = '1';
    fpsr.min = '1';
  } else {
    layoutLabel.textContent = '每行帧数';
    layoutMin.textContent = '3';
    if(parseInt(fpsr.value) < 3){
      fpsr.value = '3';

// ═══════════════════════════════
// EXIF旋转读取
// ═══════════════════════════════
function getExifOrientation(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const view = new DataView(e.target.result);
      if (view.getUint16(0, false) !== 0xFFD8) return resolve(1);
      let offset = 2;
      while (offset < view.byteLength) {
        const marker = view.getUint16(offset, false);
        offset += 2;
        if (marker === 0xFFE1) {
          if (view.getUint32(offset + 2, false) !== 0x45786966) return resolve(1);
          const little = view.getUint16(offset + 8, false) === 0x4949;
          offset += 10;
          const tags = view.getUint16(offset, little);
          offset += 2;
          for (let i = 0; i < tags; i++) {
            if (view.getUint16(offset + (i * 12), little) === 0x0112) {
              return resolve(view.getUint16(offset + (i * 12) + 8, little));
            }
          }
          return resolve(1);
        } else if ((marker & 0xFF00) !== 0xFF00) break;
        else offset += view.getUint16(offset, false);
      }
      return resolve(1);
    };
    reader.onerror = () => resolve(1);
    reader.readAsArrayBuffer(file.slice(0, 65536));
  });
}

function setErr(msg){
  document.getElementById('uerr').textContent = msg;
  if (msg) setTimeout(() => { if (document.getElementById('uerr').textContent === msg) document.getElementById('uerr').textContent = ''; }, 5000);
}

async function addFiles(files){
  if (isProcessing) { setErr('正在处理图片，请稍候...'); return; }
  setErr('');
  const arr = Array.from(files).filter(f => {
    if (!f.type.startsWith('image/')) { setErr(`已跳过不支持的文件: ${f.name}`); return false; }
    return true;
  });
  if (arr.length === 0) { setErr('没有选择有效的图片文件'); return; }
  
  isProcessing = true;
  const upTxt = uz.querySelector('.up-txt');
  const originalUpText = upTxt.innerHTML;
  upTxt.innerHTML = '正在处理图片...<br>请稍候';
  
  const maxToAdd = Math.min(arr.length, 36 - photos.length);
  if (photos.length + arr.length > 36) setErr('最多36张，多余已忽略');
  
  for (let i = 0; i < maxToAdd; i++) {
    try {
      const orientation = await getExifOrientation(arr[i]);
      const result = await loadImage(arr[i], orientation);
      if (result) photos.push(result);
    } catch (e) { console.error(e); }
    renderThumbs();
  }
  
  isProcessing = false;
  upTxt.innerHTML = originalUpText;
  fi.value = '';
}

function loadImage(file, exifOrientation) {
  return new Promise((resolve) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    const timeoutId = setTimeout(() => { URL.revokeObjectURL(url); resolve(null); }, 15000);
    
    img.onload = () => {
      clearTimeout(timeoutId);
      try {
        // 新增：exifRotation 映射到内部 rotate (0,90,180,270)
        let internalRotate = 0;
        switch(exifOrientation){
          case 3: internalRotate = 180; break;
          case 6: internalRotate = 90; break;
          case 8: internalRotate = 270; break;
        }
        
        const canvas = normalizeImg(img, 'mid', undefined, internalRotate);
        URL.revokeObjectURL(url);
        resolve({
          raw: img,
          canvas: canvas,
          name: file.name,
          crop: 'mid',
          exifOrientation: exifOrientation,
          rotate: internalRotate // 新增：存储旋转角度
        });
      } catch (e) { URL.revokeObjectURL(url); resolve(null); }
    };
    img.onerror = () => { clearTimeout(timeoutId); URL.revokeObjectURL(url); resolve(null); };
    img.src = url;
  });
}

// ═══════════════════════════════
// 核心修复：normalizeImg 支持旋转，预览/下载统一用这个
// ═══════════════════════════════
function normalizeImg(src, crop, targetAsp, rotate){
  if(targetAsp===undefined) targetAsp=filmMode==='portrait'?(2/3):(3/2);
  const TW=filmMode==='portrait'?400:600;
  const TH=Math.round(TW/targetAsp);
  
  // 先创建临时画布处理旋转
  const tempC = document.createElement('canvas');
  const tempCtx = tempC.getContext('2d');
  
  let srcW=src.naturalWidth||src.width, srcH=src.naturalHeight||src.height;
  let finalW = TW, finalH = TH;
  
  // 根据旋转角度调整临时画布尺寸和最终裁剪比例的方向
  let effectiveRotate = rotate % 360;
  if(effectiveRotate < 0) effectiveRotate += 360;
  
  // 旋转后的临时画布
  let tempW, tempH;
  if(effectiveRotate === 90 || effectiveRotate === 270){
    tempW = srcH;
    tempH = srcW;
  } else {
    tempW = srcW;
    tempH = srcH;
  }
  tempC.width = tempW;
  tempC.height = tempH;
  
  // 绘制旋转后的图到临时画布
  tempCtx.save();
  tempCtx.translate(tempW/2, tempH/2);
  tempCtx.rotate(effectiveRotate * Math.PI / 180);
  tempCtx.drawImage(src, -srcW/2, -srcH/2);
  tempCtx.restore();
  
  // 现在从临时画布裁剪，这样裁剪方向就是正确的
  const c = document.createElement('canvas');
  c.width = finalW;
  c.height = finalH;
  const ctx = c.getContext('2d');
  ctx.fillStyle='#111';
  ctx.fillRect(0,0,finalW,finalH);
  
  const sAsp = tempW / tempH;
  let sx=0, sy=0, sw=tempW, sh=tempH;
  
  if(sAsp > targetAsp){
    sw = tempH * targetAsp;
    sx = (tempW - sw)/2;
  } else {
    sh = tempW / targetAsp;
    const spare = tempH - sh;
    sy = crop==='top'?0:crop==='bot'?spare:spare/2;
  }
  
  ctx.drawImage(tempC, sx, sy, sw, sh, 0, 0, finalW, finalH);
  return c;
}

// ═══════════════════════════════
// 核心修复：renderThumbs 加旋转按钮
// ═══════════════════════════════
function renderThumbs(){
  const grid=document.getElementById('tg');grid.innerHTML='';
  const cnt=document.getElementById('ucnt');
  cnt.textContent=`${photos.length} / 36 张`;
  cnt.style.color=photos.length<8?'#e05050':photos.length===36?'#e09020':'#c8882a';
  document.getElementById('genb').disabled=photos.length<8;
  
  photos.forEach((p,i)=>{
    const wrap=document.createElement('div');wrap.className='twrap';
    const thumb=document.createElement('div');thumb.className='thumb';
    const img=document.createElement('img');img.src=p.canvas.toDataURL('image/jpeg',0.45);
    const del=document.createElement('button');del.className='tdel';del.textContent='×';
    del.onclick=e=>{e.stopPropagation();photos.splice(i,1);renderThumbs()};
    thumb.append(img,del);
    
    const crow=document.createElement('div');crow.className='croprow';
    // 上中下
    ['top','mid','bot'].forEach(c=>{
      const b=document.createElement('button');
      b.className='cbtn'+(p.crop===c?' act':'');
      b.textContent=c==='top'?'上':c==='mid'?'中':'下';
      b.onclick=()=>{
        p.crop=c;
        p.canvas=normalizeImg(p.raw,c,undefined,p.rotate);
        renderThumbs();
      };
      crow.appendChild(b);
    });
    // 旋转按钮
    const rbtn=document.createElement('button');
    rbtn.className='rbtn';
    rbtn.textContent='↻';
    rbtn.title='顺时针旋转90°';
    rbtn.onclick=()=>{
      p.rotate = (p.rotate + 90) % 360;
      p.canvas=normalizeImg(p.raw,p.crop,undefined,p.rotate);
      renderThumbs();
    };
    crow.appendChild(rbtn);
    
    wrap.append(thumb,crow);
    grid.appendChild(wrap);
  });
}

// ═══════════════════════════════
// CANVAS UTILITIES
// ═══════════════════════════════
function rrect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function sketchy(ctx,x,y,w,h,fill,lineCol){
  ctx.fillStyle=fill;ctx.fillRect(x,y,w,h);
  if(!lineCol)return;
  ctx.save();ctx.strokeStyle=lineCol;ctx.lineWidth=1.4;ctx.lineCap='round';
  const j=()=>(Math.random()-0.5)*1.4;
  ctx.beginPath();ctx.moveTo(x+j(),y+j());ctx.lineTo(x+w+j(),y+j());ctx.lineTo(x+w+j(),y+h+j());ctx.lineTo(x+j(),y+h+j());ctx.closePath();ctx.stroke();ctx.restore();
}
function drawPerfs(ctx,x,y,sw,perfH,pr){
  const hCount=Math.max(4,Math.round(sw/20));
  const hW=9,hH=Math.round(perfH*0.55),hR=2;
  const hs=sw/hCount;
  ctx.fillStyle=pr.holeBg;
  for(let i=0;i<hCount;i++){rrect(ctx,x+hs*i+(hs-hW)/2,y+(perfH-hH)/2,hW,hH,hR);ctx.fill()}
}
function tongue(x,y,w,h){
  const ts=x+w*0.55,nW=w*0.08,hz=Math.round(h*0.22);
  const mY=y+h/2,tH=h*0.48,t1=mY-tH/2,t2=mY+tH/2;
  const tx=ts+nW,ty=y+hz+2,tw=x+w-tx,th=h-hz*2-4;
  return{ts,nW,hz,t1,t2,tx,ty,tw,th};
}
function clipTongue(ctx,x,y,w,h){
  const{ts,nW,hz,t1,t2}=tongue(x,y,w,h);
  const ty=y+hz+2,bH=h-hz*2-4;
  ctx.beginPath();ctx.moveTo(ts,t1);ctx.lineTo(ts+nW,t1);ctx.lineTo(ts+nW,ty);ctx.lineTo(x+w,ty);
  ctx.lineTo(x+w,ty+bH);ctx.lineTo(ts+nW,ty+bH);ctx.lineTo(ts+nW,t2);ctx.lineTo(ts,t2);ctx.closePath();
}
function sketchStroke(ctx,x,y,w,h,r,col,lw){
  ctx.save();ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.lineCap='round';
  const j=()=>(Math.random()-0.5)*1.2;
  ctx.beginPath();ctx.moveTo(x+r+j(),y+j());ctx.lineTo(x+w-r+j(),y+j());ctx.quadraticCurveTo(x+w+j(),y+j(),x+w+j(),y+r+j());
  ctx.lineTo(x+w+j(),y+h-r+j());ctx.quadraticCurveTo(x+w+j(),y+h+j(),x+w-r+j(),y+h+j());
  ctx.lineTo(x+r+j(),y+h+j());ctx.quadraticCurveTo(x+j(),y+h+j(),x+j(),y+h-r+j());
  ctx.lineTo(x+j(),y+r+j());ctx.quadraticCurveTo(x+j(),y+j(),x+r+j(),y+j());ctx.closePath();ctx.stroke();ctx.restore();
}

  const lx=bx+bw*0.04,lw=bw*0.92,ly=by+bh*0.15,lh=bh*0.6;
  LEADERS[leaderIdx].draw(ctx,lx,ly,lw,lh,true);
  const capH=h*0.1;ctx.fillStyle='#2a2a2a';rrect(ctx,bx+bw*0.1,y,bw*0.8,capH,4);ctx.fill();
  sketchStroke(ctx,bx+bw*0.1,y,bw*0.8,capH,4,'rgba(255,255,255,0.1)',1);
  ctx.beginPath();ctx.arc(bx+bw/2,y+capH/2,bw*0.08,0,Math.PI*2);ctx.fillStyle='#111';ctx.fill();
  const lipH=h*0.07;ctx.fillStyle='#222';rrect(ctx,bx+bw*0.05,by+bh-lipH,bw*0.9,lipH,3);ctx.fill();
  const hlx=bx+bw*0.7,hlw=bw*0.06;

// ═══════════════════════════════
// IMAGE PROCESSING
// ═══════════════════════════════
function applyLook(src,pr,intPct){
  const w=src.width,h=src.height;
  const out=document.createElement('canvas');out.width=w;out.height=h;
  const ctx=out.getContext('2d');ctx.drawImage(src,0,0);
  if(preset==='none')return out;
  const ratio=intPct/100;
  const id=ctx.getImageData(0,0,w,h);const d=id.data;
  const isBW=pr.sat===0;const sat=1+(pr.sat-1)*ratio;
  for(let i=0;i<d.length;i+=4){
    let r=d[i],g=d[i+1],b=d[i+2];let pr2=r,pg=g,pb=b;
    if(isBW){const lum=0.299*r+0.587*g+0.114*b;pr2=lum+(lum>180?(lum-180)*0.025:0);pg=lum;pb=lum-(lum>180?(lum-180)*0.01:0)}
    else{if(pr.r){pr2=pr.r[0]+(r/255)*(pr.r[1]-pr.r[0]);pg=pr.g[0]+(g/255)*(pr.g[1]-pr.g[0]);pb=pr.b[0]+(b/255)*(pr.b[1]-pr.b[0])}if(sat!==1){const gray=0.299*pr2+0.587*pg+0.114*pb;pr2=gray+sat*(pr2-gray);pg=gray+sat*(pg-gray);pb=gray+sat*(pb-gray)}}
    d[i]=Math.min(255,Math.max(0,Math.round(r+(pr2-r)*ratio)));d[i+1]=Math.min(255,Math.max(0,Math.round(g+(pg-g)*ratio)));d[i+2]=Math.min(255,Math.max(0,Math.round(b+(pb-b)*ratio)));
  }
  ctx.putImageData(id,0,0);
  if(pr.tint){ctx.globalAlpha=ratio;ctx.fillStyle=pr.tint;ctx.fillRect(0,0,w,h);ctx.globalAlpha=1}
  const gr=Math.round((pr.grain||0)*ratio);
  if(gr>0){const gd=ctx.createImageData(w,h);for(let i=0;i<gd.data.length;i+=4){const v=(Math.random()-.5)*gr;gd.data[i]=128+v;gd.data[i+1]=128+v;gd.data[i+2]=128+v;gd.data[i+3]=16}const gc=document.createElement('canvas');gc.width=w;gc.height=h;gc.getContext('2d').putImageData(gd,0,0);ctx.globalCompositeOperation='overlay';ctx.drawImage(gc,0,0);ctx.globalCompositeOperation='source-over'}
  return out;
}

// ═══════════════════════════════
// 绘制单条胶片（胶卷/海报模式通用核心）
// ═══════════════════════════════
function drawSingleStrip(ctx, stripX, y, stripW, stripH, frameW, frameH, perfH, pr, rowPhotos, globalFrame, isPoster){
  // 胶片背景
  ctx.fillStyle = isPoster ? '#2a2a2a' : pr.filmBg;
  ctx.fillRect(stripX, y, stripW, stripH);
  
  // 齿孔
  drawPerfs(ctx, stripX, y, stripW, perfH, isPoster ? {holeBg:'#f8f5ee'} : pr);
  drawPerfs(ctx, stripX, y + stripH - perfH, stripW, perfH, isPoster ? {holeBg:'#f8f5ee'} : pr);
  
  // 照片和序号
  for(let f=0; f<rowPhotos.length; f++){
    const fx = stripX + EDGE + f * (frameW + GAP);
    const fy = y + perfH;
    const processed = applyLook(rowPhotos[f].canvas, pr, intensity);
    ctx.save();
    ctx.beginPath();
    ctx.rect(fx, fy, frameW, frameH);
    ctx.clip();
    ctx.drawImage(processed, fx, fy, frameW, frameH);
    ctx.restore();
    
    // 序号
    ctx.fillStyle = isPoster ? 'rgba(255,255,255,0.35)' : 'rgba(255,255,255,0.22)';
    ctx.font = `bold ${Math.round(stripH * 0.07)}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText((globalFrame + f + 1).toString(), fx + frameW/2, y + perfH - Math.round(perfH * 0.2));
  }
}

// ═══════════════════════════════
// 核心修复：海报模式复用胶片逻辑，回归胶片框
// ═══════════════════════════════
function generatePoster(){
  const n=photos.length, pr=PRESETS[preset];
  const colCount = parseInt(document.getElementById('fpsr').value); // 海报是列数
  const titleText=document.getElementById('posterTitle').value.trim()||'LIFE WITH FILM';
  const tags=[document.getElementById('tag1').value.trim(),document.getElementById('tag2').value.trim(),document.getElementById('tag3').value.trim()].filter(t=>t.length>0);
  
  // 海报模式下，胶片的尺寸稍微调整，让间距更大，适合白底
  let PERF_H, FRAME_W, FRAME_H, STRIP_H, GAP_P = 16, P_MARGIN=40, P_TITLE_H=80, P_TAG_H=tags.length>0?70:0;
  
  // 这里的filmMode控制单张照片的比例，海报模式下单条胶片还是横向的，但列数是垂直的
  if(filmMode==='portrait'){
    PERF_H = 22;
    FRAME_W = 160;
    FRAME_H = Math.round(FRAME_W * 1.5);
  } else {
    PERF_H = 20;
    FRAME_W = 200;
    FRAME_H = Math.round(FRAME_W / 1.5);
  }
  STRIP_H = FRAME_H + PERF_H * 2;
  
  // 单列的话放大照片
  if(colCount === 1){
    FRAME_W = Math.min(FRAME_W * 1.3, 350);
    FRAME_H = filmMode==='portrait' ? Math.round(FRAME_W * 1.5) : Math.round(FRAME_W / 1.5);
    STRIP_H = FRAME_H + PERF_H * 2;
  }
  
  // 海报模式下，把“每列”拆成“多条横向胶片”？不对，应该是：
  // 每列是一条竖向排列的胶片？不，复用横向胶片逻辑更简单，把“列”作为“行”，转个思路
  // 哦不，用户说的“单列”，是指竖版长图，一列从上到下。所以我们把原来的“行”和“列”换一下，
  // 并且把单条胶片做成“只有一帧的竖向胶片”？
  // 不对，更简单的：复用 drawSingleStrip，但是把胶片旋转90度？或者直接调整为“每条胶片只有1帧，多条胶片垂直排列”
  // 为了最简单且保留胶片框，我们这样：
  // 海报模式下，fps=1（每条胶片只有1帧），列数=原来的行数
  const rows = colCount; // 这里的rows是“垂直列数”，哦不，反过来：
  const itemsPerStrip = 1; // 每条胶片只放1张照片
  const strips = Math.ceil(n / itemsPerStrip);
  const cols = colCount; // 垂直方向排cols条胶片
  
  const finalW = P_MARGIN * 2 + cols * (FRAME_W + EDGE*2 + GAP_P) - GAP_P;
  const finalH = P_MARGIN + P_TITLE_H + Math.ceil(strips / cols) * (STRIP_H + GAP_P) - GAP_P + P_TAG_H + P_MARGIN;
  
  const S = 2;
  const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
  cv.width=finalW*S;cv.height=finalH*S;cv.style.width=finalW+'px';cv.style.height=finalH+'px';ctx.scale(S,S);
  
  // 白底纹理
  ctx.fillStyle='#f8f5ee';
  ctx.fillRect(0,0,finalW,finalH);
  for(let i=0;i<1500;i++){ctx.fillStyle=`rgba(0,0,0,${Math.random()*0.015})`;ctx.fillRect(Math.random()*finalW,Math.random()*finalH,1,1)}
  
  // 标题
  let curY = P_MARGIN;
  ctx.fillStyle='#111';
  ctx.textAlign = 'center';
  ctx.font = `bold 48px 'Special Elite', monospace`;
  ctx.fillText(titleText.toUpperCase(), finalW/2, curY+55);
  curY += P_TITLE_H;
  
  // 绘制胶片条（每条1帧，垂直排列成cols列）
  const startX = (finalW - (cols * (FRAME_W + EDGE*2) + (cols-1)*GAP_P)) / 2;
  let globalFrame = 0;
  
  for(let s=0; s<strips; s++){
    const col = s % cols;
    const row = Math.floor(s / cols);
    const sx = startX + col * (FRAME_W + EDGE*2 + GAP_P);
    const sy = curY + row * (STRIP_H + GAP_P);
    const stripW = FRAME_W + EDGE*2;
    const rowPhotos = photos.slice(s*itemsPerStrip, (s+1)*itemsPerStrip);
    
    drawSingleStrip(ctx, sx, sy, stripW, STRIP_H, FRAME_W, FRAME_H, PERF_H, pr, rowPhotos, globalFrame, true);
    globalFrame += rowPhotos.length;
  }
  
  curY += Math.ceil(strips / cols) * (STRIP_H + GAP_P) - GAP_P + 20;
  
  // 底部标签
  if(tags.length>0){
    const tagH=36,tagPadX=14,tagFontSize=13,tagGap=10,tagRadius=4;
    ctx.font=`${tagFontSize}px 'Noto Serif SC', monospace`;
    let totalTagW = 0;
    tags.forEach(t=>totalTagW += ctx.measureText(t).width + tagPadX*2 + tagGap);
    totalTagW -= tagGap;
    let tagX = (finalW - totalTagW)/2;
    
    tags.forEach(tagText=>{
      const textW=ctx.measureText(tagText).width,tW=textW+tagPadX*2;
      ctx.fillStyle='#111';rrect(ctx,tagX,curY,tW,tagH,tagRadius);ctx.fill();
      ctx.fillStyle='#fff';
      ctx.textAlign='center';
      ctx.font=`${tagFontSize}px 'Noto Serif SC', monospace`;
      ctx.fillText(tagText,tagX+tW/2,curY+tagPadX+tagFontSize);
      tagX+=tW+tagGap;
    });
  }
  
  document.getElementById('ph').style.display='none';cv.style.display='block';document.getElementById('expb').disabled=false;
}

// ═══════════════════════════════
// 胶卷模式（简化，复用 drawSingleStrip）
// ═══════════════════════════════
function generateFilmRoll(){
  const n=photos.length,pr=PRESETS[preset];
  const fps=parseInt(document.getElementById('fpsr').value);
  const dateStr=document.getElementById('datin').value.trim();
  const useWB=document.getElementById('wbToggle').checked;
  const S=2;
  let STRIP_H,PERF_H,FRAME_W,FRAME_H,STRIP_W,LEFT_PAD;
  if(filmMode==='portrait'){PERF_H=PORT.perfH;FRAME_W=PORT.frameW;FRAME_H=PORT.frameH;STRIP_H=PORT.stripH;STRIP_W=PORT.stripW(fps);LEFT_PAD=PORT.leftPad(fps)}
  else{PERF_H=LAND.perfH;FRAME_H=LAND.frameH;FRAME_W=LAND.frameW;STRIP_H=LAND.stripH;STRIP_W=LAND.stripW(fps);LEFT_PAD=LAND.leftPad}
  const CAN_W=STRIP_H*0.60,CAN_OVERLAP=CAN_W*0.15,rows=Math.ceil(n/fps);
  let CW=LEFT_PAD+STRIP_W+PAD;
  let CH=PAD+(dateStr?20:8)+rows*STRIP_H+(rows-1)*ROW_GAP+ROW_GAP+PAD+18;
  const wbOff=useWB?WB:0,fullW=CW+wbOff*2,fullH=CH+wbOff*2;
  const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
  cv.width=fullW*S;cv.height=fullH*S;cv.style.width=fullW+'px';cv.style.height=fullH+'px';ctx.scale(S,S);
  if(useWB){
    ctx.fillStyle='#f8f5ee';ctx.fillRect(0,0,fullW,fullH);
    const sGrad=ctx.createLinearGradient(0,0,0,fullH);sGrad.addColorStop(0,'rgba(0,0,0,0.06)');sGrad.addColorStop(0.08,'rgba(0,0,0,0)');sGrad.addColorStop(0.92,'rgba(0,0,0,0)');sGrad.addColorStop(1,'rgba(0,0,0,0.06)');ctx.fillStyle=sGrad;ctx.fillRect(0,0,fullW,fullH);
    const sGrad2=ctx.createLinearGradient(0,0,fullW,0);sGrad2.addColorStop(0,'rgba(0,0,0,0.04)');sGrad2.addColorStop(0.06,'rgba(0,0,0,0)');sGrad2.addColorStop(0.94,'rgba(0,0,0,0)');sGrad2.addColorStop(1,'rgba(0,0,0,0.04)');ctx.fillStyle=sGrad2;ctx.fillRect(0,0,fullW,fullH);
    for(let i=0;i<800;i++){ctx.fillStyle=`rgba(0,0,0,${Math.random()*0.018})`;ctx.fillRect(Math.random()*fullW,Math.random()*fullH,1,1)}
  }
  const ox=wbOff,oy=wbOff;let contentY=oy+PAD;
  if(dateStr){ctx.font='italic 11px Georgia,serif';ctx.fillStyle='#aaa';ctx.textAlign='left';ctx.fillText(dateStr,ox+LEFT_PAD,contentY+13);contentY+=20}else{contentY+=8}
  const stripX=ox+LEFT_PAD;let globalFrame=0;
  
  for(let row=0;row<rows;row++){
    if(row>0)contentY+=ROW_GAP;
    const rowPhotos=photos.slice(row*fps,(row+1)*fps);const y=contentY;
    const emptySlots=fps-rowPhotos.length;
    
    // 处理胶卷舌头
    if(row===rows-1&&emptySlots>0){
      const tongueWidth=emptySlots*(FRAME_W+GAP);
      const ts=stripX+STRIP_W-tongueWidth,hz=PERF_H;
      const midTop=y+hz,midBot=y+STRIP_H-hz;
      const notchW=tongueWidth*0.1;
      const notchTop=midTop-(midBot-midTop)*0.05,notchBot=midBot+(midBot-midTop)*0.05;
      const cornerRadius=8;
      ctx.beginPath();ctx.moveTo(stripX,y);ctx.lineTo(ts,y);ctx.lineTo(ts,notchTop);ctx.lineTo(ts+notchW,notchTop);ctx.lineTo(ts+notchW,midTop);ctx.quadraticCurveTo(stripX+STRIP_W,midTop,stripX+STRIP_W,midTop+cornerRadius);ctx.lineTo(stripX+STRIP_W,midBot-cornerRadius);ctx.quadraticCurveTo(stripX+STRIP_W,midBot,stripX+STRIP_W-cornerRadius,midBot);ctx.lineTo(ts+notchW,midBot);ctx.lineTo(ts+notchW,notchBot);ctx.lineTo(ts,notchBot);ctx.lineTo(stripX,y+STRIP_H);ctx.lineTo(stripX,y);ctx.closePath();ctx.fill();
      
      const tailGrad=ctx.createLinearGradient(ts,0,stripX+STRIP_W,0);tailGrad.addColorStop(0,'rgba(0,0,0,0)');tailGrad.addColorStop(1,'rgba(0,0,0,0.6)');ctx.save();ctx.fillStyle=tailGrad;ctx.fillRect(ts,y,tongueWidth,STRIP_H);ctx.restore();
      
      // 绘制有舌头的部分胶片
      drawSingleStrip(ctx, stripX, y, ts-stripX, STRIP_H, FRAME_W, FRAME_H, PERF_H, pr, rowPhotos, globalFrame, false);
    } else {
      drawSingleStrip(ctx, stripX, y, STRIP_W, STRIP_H, FRAME_W, FRAME_H, PERF_H, pr, rowPhotos, globalFrame, false);
    }
    
    if(row===0){const canX=stripX-CAN_W+CAN_OVERLAP;drawCanister(ctx,canX,y,CAN_W,CAN_W*(STRIP_H/(STRIP_H*0.60)))}
    
    // 胶卷名称
    if(row === 0){
      const ldrName=LEADERS[leaderIdx].name.replace('\n',' ').toUpperCase();
      ctx.font=`${Math.round(PERF_H*0.4)}px monospace`;ctx.fillStyle='rgba(255,255,255,0.18)';ctx.textAlign='left';ctx.fillText(ldrName,stripX+EDGE,y+PERF_H*0.55);
    }
    
    globalFrame+=rowPhotos.length;contentY+=STRIP_H;
  }
  contentY+=ROW_GAP;
  const filmName=LEADERS[leaderIdx].name.replace('\n',' ');
  ctx.font='10px monospace';ctx.fillStyle=useWB?'#aaa':'#888';ctx.textAlign='center';
  ctx.fillText(filmName+(dateStr?' · '+dateStr:''),ox+LEFT_PAD+STRIP_W/2,contentY+10);
  
  document.getElementById('ph').style.display='none';cv.style.display='block';document.getElementById('expb').disabled=false;
}

// ═══════════════════════════════
// GENERATE DISPATCHER
// ═══════════════════════════════
function generate(){
  const n=photos.length;
  if(n<8){setErr('至少需要8张照片');return}
  if(n>36){setErr('最多36张');return}
  setErr('');
  sheetOpen=false;sheet.classList.remove('open');
  if(outputMode==='poster')generatePoster();else generateFilmRoll();
}

// ═══════════════════════════════
// EXPORT
// ═══════════════════════════════
function exportPNG(){
  const cv=document.getElementById('cv');
  if(cv.style.display==='none')return;
  const name=outputMode==='poster'?`film-poster-${Date.now()}.png`:`film-${filmMode}-${LEADERS[leaderIdx].name.replace(/\n/g,'-').replace(/\s+/g,'')}-${Date.now()}.png`;
  const a=document.createElement('a');a.download=name;a.href=cv.toDataURL('image/png');a.click();
}

// ═══════════════════════════════
// INIT
// ═══════════════════════════════
initLeaderGrid();
renderThumbs();
updateLayoutUI();
</script>
